<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Family World Cup Pool 2026 🏆</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:ital,wght@0,400;0,600;0,700;1,400&family=Barlow+Condensed:wght@700;900&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --g:#00a550;--gd:#007a3d;--gold:#f5c518;--goldd:#c9a000;
  --red:#e63946;--navy:#0d1b2a;--navy2:#152236;--navy3:#1e3048;
  --white:#f0f4f8;--gray:#7a8899;--border:rgba(255,255,255,0.08);
}
body{font-family:'Barlow',sans-serif;background:var(--navy);color:var(--white);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;
  background:repeating-linear-gradient(0deg,rgba(255,255,255,0.012) 0,rgba(255,255,255,0.012) 1px,transparent 1px,transparent 48px),
             repeating-linear-gradient(90deg,rgba(255,255,255,0.012) 0,rgba(255,255,255,0.012) 1px,transparent 1px,transparent 48px);
  pointer-events:none;z-index:0}

/* HEADER */
header{position:relative;z-index:5;background:linear-gradient(135deg,#004d20 0%,#006b2e 40%,var(--navy2) 100%);border-bottom:3px solid var(--gold)}
.hinner{max-width:1100px;margin:0 auto;padding:24px 20px 18px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
h1{font-family:'Bebas Neue',sans-serif;font-size:clamp(2rem,5vw,3.6rem);letter-spacing:3px;line-height:1;
   background:linear-gradient(135deg,#fff 20%,var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.sub{color:rgba(255,255,255,0.55);font-size:.8rem;letter-spacing:2px;text-transform:uppercase;margin-top:4px}
.ball{font-size:3rem;animation:spin 10s linear infinite;display:inline-block;filter:drop-shadow(0 0 10px rgba(245,197,24,.4))}
@keyframes spin{to{transform:rotate(360deg)}}

/* NAV */
nav{position:relative;z-index:5;background:var(--navy2);border-bottom:1px solid var(--border);display:flex;justify-content:center;flex-wrap:wrap;gap:4px;padding:8px 12px}
.nav-btn{font-family:'Barlow Condensed',sans-serif;font-size:1rem;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;
  background:transparent;color:var(--gray);border:2px solid transparent;border-radius:6px;padding:8px 18px;cursor:pointer;transition:.2s all}
.nav-btn:hover{color:var(--white);border-color:var(--border)}
.nav-btn.active{color:var(--gold);border-color:var(--gold);background:rgba(245,197,24,.07)}

/* MAIN */
main{position:relative;z-index:1;max-width:1100px;margin:0 auto;padding:28px 16px 80px}
.page{display:none}.page.active{display:block}

/* TITLES */
.stitle{font-family:'Bebas Neue',sans-serif;font-size:2.2rem;letter-spacing:3px;color:var(--gold);margin-bottom:4px}
.ssub{color:var(--gray);font-size:.82rem;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:26px}

/* CARDS */
.card{background:var(--navy2);border:1px solid var(--border);border-radius:12px;padding:22px}

/* SETUP GRID */
.setup-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:18px}
.team-card{background:var(--navy2);border:2px solid var(--border);border-radius:14px;padding:20px;transition:border-color .2s}
.team-card.full{border-color:var(--g)}
.tc-head{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.tc-mascot{font-size:2.2rem;line-height:1;cursor:default}
.tc-name{font-family:'Barlow Condensed',sans-serif;font-size:1.25rem;font-weight:700;letter-spacing:1px;
  background:transparent;border:none;border-bottom:2px solid var(--border);color:var(--white);width:100%;padding:3px 2px;outline:none;transition:.2s}
.tc-name:focus{border-bottom-color:var(--gold)}
.mascot-row{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:12px}
.mb{font-size:1.3rem;background:rgba(255,255,255,.04);border:2px solid transparent;border-radius:7px;padding:3px 7px;cursor:pointer;transition:.15s}
.mb:hover,.mb.sel{border-color:var(--gold);background:rgba(245,197,24,.1)}
.slots{display:flex;flex-direction:column;gap:7px}
.slot{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:8px;padding:8px 11px;font-size:.9rem}
.slot-flag{font-size:1.2rem}
.slot-name{flex:1;color:var(--gray);font-style:italic}
.slot-name.on{color:var(--white);font-style:normal;font-weight:600}
.slot-rm{background:none;border:none;color:var(--red);cursor:pointer;font-size:.95rem;padding:0 3px;opacity:.6;transition:.15s}
.slot-rm:hover{opacity:1}
.pick-btn{margin-top:10px;width:100%;background:linear-gradient(135deg,var(--g),var(--gd));color:#fff;border:none;border-radius:8px;
  font-family:'Barlow Condensed',sans-serif;font-size:1rem;font-weight:700;letter-spacing:1px;padding:10px;cursor:pointer;transition:.2s}
.pick-btn:disabled{opacity:.3;cursor:not-allowed}
.pick-btn:not(:disabled):hover{opacity:.85}

/* MODAL */
.overlay{position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,.78);backdrop-filter:blur(5px);
  display:flex;align-items:center;justify-content:center;padding:16px;animation:fi .2s}
@keyframes fi{from{opacity:0}to{opacity:1}}
.modal{background:var(--navy2);border:1px solid var(--border);border-radius:16px;padding:26px;
  width:100%;max-width:620px;max-height:84vh;overflow-y:auto;animation:su .25s ease}
@keyframes su{from{transform:translateY(28px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal h3{font-family:'Bebas Neue',sans-serif;font-size:1.7rem;letter-spacing:2px;color:var(--gold);margin-bottom:14px}
.msearch{width:100%;background:rgba(255,255,255,.07);border:1px solid var(--border);border-radius:8px;
  color:var(--white);font-size:.95rem;padding:9px 13px;outline:none;margin-bottom:14px;transition:.2s}
.msearch:focus{border-color:var(--gold)}
.glabel{font-family:'Barlow Condensed',sans-serif;font-size:.75rem;font-weight:700;letter-spacing:2px;color:var(--gold);
  text-transform:uppercase;margin:11px 0 7px;padding-bottom:4px;border-bottom:1px solid var(--border)}
.cgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(138px,1fr));gap:7px}
.cbtn{display:flex;align-items:center;gap:7px;background:rgba(255,255,255,.05);border:2px solid transparent;border-radius:8px;
  padding:7px 9px;cursor:pointer;color:var(--white);font-size:.85rem;font-weight:600;text-align:left;transition:.15s;width:100%}
.cbtn:hover{border-color:var(--g);background:rgba(0,165,80,.12)}
.cbtn.taken{opacity:.3;cursor:not-allowed;pointer-events:none}
.mclose{margin-top:18px;width:100%;background:rgba(255,255,255,.06);border:1px solid var(--border);
  color:var(--gray);border-radius:8px;padding:10px;cursor:pointer;font-size:.95rem;transition:.15s}
.mclose:hover{color:var(--white);border-color:var(--gray)}

/* STANDINGS */
.std-actions{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap}
.btn{font-family:'Barlow Condensed',sans-serif;font-size:.95rem;font-weight:700;letter-spacing:1px;
  border-radius:8px;padding:9px 20px;cursor:pointer;border:2px solid transparent;transition:.2s}
.btn-gold{background:var(--gold);color:var(--navy)}.btn-gold:hover{background:var(--goldd)}
.btn-outline{background:transparent;color:var(--gold);border-color:var(--gold)}.btn-outline:hover{background:rgba(245,197,24,.1)}
.btn-green{background:var(--g);color:#fff}.btn-green:hover{background:var(--gd)}
table{width:100%;border-collapse:collapse}
th{font-family:'Barlow Condensed',sans-serif;font-size:.75rem;letter-spacing:2px;text-transform:uppercase;
  color:var(--gold);padding:10px 14px;text-align:left;border-bottom:2px solid var(--border)}
td{padding:12px 14px;border-bottom:1px solid var(--border)}
tr:hover td{background:rgba(255,255,255,.02)}
.rank{font-family:'Bebas Neue',sans-serif;font-size:1.4rem;width:34px;height:34px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.07)}
.rank.r1{background:var(--gold);color:var(--navy)}
.rank.r2{background:#9aa5b4;color:var(--navy)}
.rank.r3{background:#b87333;color:#fff}
.tname{font-family:'Barlow Condensed',sans-serif;font-size:1.15rem;font-weight:700}
.cpills{display:flex;gap:4px;flex-wrap:wrap;margin-top:2px}
.pill{font-size:.72rem;background:rgba(255,255,255,.07);border-radius:4px;padding:2px 7px;color:var(--gray)}
.pts{font-family:'Bebas Neue',sans-serif;font-size:1.8rem;color:var(--gold);text-align:right}
.pts-in{width:65px;background:rgba(255,255,255,.07);border:1px solid var(--border);border-radius:6px;
  color:var(--white);text-align:center;font-size:1rem;padding:5px;outline:none}
.pts-in:focus{border-color:var(--gold)}

/* FACTS */
.fsearch{width:100%;max-width:400px;background:rgba(255,255,255,.07);border:1px solid var(--border);
  border-radius:8px;color:var(--white);font-size:.95rem;padding:9px 13px;outline:none;margin-bottom:22px}
.fsearch:focus{border-color:var(--gold)}
.facts-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:18px}
.fcard{background:var(--navy2);border:1px solid var(--border);border-radius:13px;overflow:hidden}
.fhead{display:flex;align-items:center;gap:12px;padding:16px 18px 13px;border-bottom:1px solid var(--border);background:rgba(255,255,255,.02)}
.fflag{font-size:2.2rem}
.fcname{font-family:'Bebas Neue',sans-serif;font-size:1.5rem;letter-spacing:2px}
.ftabs{display:flex;border-bottom:1px solid var(--border)}
.ftab{flex:1;background:none;border:none;border-bottom:2px solid transparent;color:var(--gray);
  font-size:.8rem;font-weight:600;letter-spacing:1px;text-transform:uppercase;padding:9px;cursor:pointer;transition:.15s}
.ftab.active{color:var(--gold);border-bottom-color:var(--gold)}
.fbody{padding:15px 18px;font-size:.88rem;line-height:1.65;color:rgba(255,255,255,.8);min-height:110px}
.rtitle{font-family:'Barlow Condensed',sans-serif;font-size:1rem;font-weight:700;color:var(--gold);margin-bottom:7px}
.ilist{list-style:none;margin-bottom:9px}
.ilist li::before{content:'•';color:var(--g);margin-right:6px}
.rsteps{color:var(--gray);font-size:.82rem;line-height:1.6;margin-top:6px}

/* SMACK */
.sfeed{display:flex;flex-direction:column;gap:12px;margin-bottom:20px}
.sbubble{background:var(--navy2);border:1px solid var(--border);border-radius:12px;padding:15px 18px;animation:pop .3s cubic-bezier(.175,.885,.32,1.275)}
@keyframes pop{from{transform:scale(.92) translateY(8px);opacity:0}to{transform:scale(1) translateY(0);opacity:1}}
.shead{display:flex;align-items:center;gap:9px;margin-bottom:7px}
.smascot{font-size:1.5rem}
.steam{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.95rem;color:var(--gold)}
.stime{font-size:.72rem;color:var(--gray);margin-left:auto}
.stext{font-size:.9rem;line-height:1.5}
.scompose{display:flex;gap:9px;flex-wrap:wrap;align-items:center}
.ssel{background:rgba(255,255,255,.07);border:1px solid var(--border);border-radius:8px;color:var(--white);font-size:.9rem;padding:9px 11px;outline:none;cursor:pointer}
.sinput{flex:1;min-width:180px;background:rgba(255,255,255,.07);border:1px solid var(--border);border-radius:8px;color:var(--white);font-size:.9rem;padding:9px 13px;outline:none}
.sinput:focus{border-color:var(--gold)}

/* CONFETTI */
.cp{position:fixed;top:-20px;border-radius:3px;animation:cf linear forwards;pointer-events:none;z-index:9999}
@keyframes cf{to{transform:translateY(110vh) rotate(720deg);opacity:0}}

/* EMPTY */
.empty{text-align:center;padding:50px 20px;color:var(--gray)}
.empty .ei{font-size:3.5rem;margin-bottom:12px}
.empty h3{font-family:'Bebas Neue',sans-serif;font-size:1.6rem;letter-spacing:2px;color:rgba(255,255,255,.25);margin-bottom:6px}

@media(max-width:580px){.hinner{padding:18px 14px 14px}.stitle{font-size:1.8rem}}
</style>
</head>
<body>
<div id="confetti-host"></div>

<header>
  <div class="hinner">
    <div>
      <h1>⚽ Family World Cup Pool</h1>
      <div class="sub">FIFA World Cup 2026 · USA / Canada / Mexico</div>
    </div>
    <span class="ball">⚽</span>
  </div>
</header>

<nav id="nav">
  <button class="nav-btn active" data-p="setup">🏗 Team Setup</button>
  <button class="nav-btn" data-p="standings">🏆 Standings</button>
  <button class="nav-btn" data-p="facts">🌎 Country Facts</button>
  <button class="nav-btn" data-p="smack">💬 Smack Talk</button>
</nav>

<main>
  <div id="pg-setup"   class="page active"></div>
  <div id="pg-standings" class="page"></div>
  <div id="pg-facts"   class="page"></div>
  <div id="pg-smack"  class="page"></div>
</main>

<script>
// ─── DATA ───────────────────────────────────────────────────────
const MASCOTS = ['🦁','🐯','🦅','🐺','🦊','🐉','🦈','🐻','🦋','🦏','🦍','🦜','🐊','🦩','🦚'];

const GROUPS = {
  'Group A':[{n:'USA',f:'🇺🇸'},{n:'Mexico',f:'🇲🇽'},{n:'Canada',f:'🇨🇦'},{n:'Serbia',f:'🇷🇸'}],
  'Group B':[{n:'Germany',f:'🇩🇪'},{n:'Netherlands',f:'🇳🇱'},{n:'Spain',f:'🇪🇸'},{n:'Morocco',f:'🇲🇦'}],
  'Group C':[{n:'Brazil',f:'🇧🇷'},{n:'Argentina',f:'🇦🇷'},{n:'Ecuador',f:'🇪🇨'},{n:'Cameroon',f:'🇨🇲'}],
  'Group D':[{n:'France',f:'🇫🇷'},{n:'England',f:'🏴󠁧󠁢󠁥󠁮󠁧󠁿'},{n:'Portugal',f:'🇵🇹'},{n:'Belgium',f:'🇧🇪'}],
  'Group E':[{n:'Japan',f:'🇯🇵'},{n:'South Korea',f:'🇰🇷'},{n:'Saudi Arabia',f:'🇸🇦'},{n:'Iran',f:'🇮🇷'}],
  'Group F':[{n:'Italy',f:'🇮🇹'},{n:'Croatia',f:'🇭🇷'},{n:'Switzerland',f:'🇨🇭'},{n:'Ukraine',f:'🇺🇦'}],
  'Group G':[{n:'Poland',f:'🇵🇱'},{n:'Colombia',f:'🇨🇴'},{n:'Chile',f:'🇨🇱'},{n:'Senegal',f:'🇸🇳'}],
  'Group H':[{n:'Australia',f:'🇦🇺'},{n:'Denmark',f:'🇩🇰'},{n:'Turkey',f:'🇹🇷'},{n:'Egypt',f:'🇪🇬'}],
  'Group I':[{n:'Nigeria',f:'🇳🇬'},{n:'Uruguay',f:'🇺🇾'},{n:'Scotland',f:'🏴󠁧󠁢󠁳󠁣󠁴󠁿'},{n:'Greece',f:'🇬🇷'}],
};
const ALL = Object.values(GROUPS).flat();

const FACTS = {
  'USA':{fact:"Home to 330M+ people. The USMNT has qualified for 11 World Cups. Soccer is the fastest-growing sport in the country and the 2026 edition is set to be the biggest World Cup ever with 48 teams.",recipe:{name:'🍔 Classic Cheeseburger',ing:['1 lb ground beef (80/20 blend)','4 slices American cheese','4 brioche buns','Lettuce, tomato, onion, pickles','Special sauce: mayo + ketchup + relish'],steps:'Form 4 patties, season with salt & pepper. Grill on high 3-4 min per side. Melt cheese on in last minute. Toast buns. Build with all the toppings and sauce.'}},
  'Mexico':{fact:"El Tri have qualified for 17 World Cups — a national obsession. Their greatest moment was the 1986 quarter-final on home soil. Mexico co-hosts 2026, playing their group games at the iconic Estadio Azteca.",recipe:{name:'🥑 Guacamole Auténtico',ing:['3 ripe avocados','1 lime, juiced','½ white onion, finely diced','2 serrano peppers, minced','Handful fresh cilantro','Salt to taste'],steps:'Mash avocados coarsely — keep it chunky. Fold in all ingredients. Taste, season, serve immediately with tortilla chips. Never use a food processor. Never add sour cream.'}},
  'Canada':{fact:"Canada qualified for the 2022 World Cup for the first time in 36 years AND co-hosts 2026. The Canadian Premier League is growing fast and a new golden generation is capturing the country's imagination.",recipe:{name:'🍟 Poutine',ing:['4 large russet potatoes (cut into fries)','2 cups beef gravy','2 cups fresh cheese curds','Salt & pepper'],steps:'Cut and double-fry potatoes until golden and crispy. Heat gravy until bubbling hot. Layer fries in a bowl, add cheese curds, immediately smother with hot gravy. The heat slightly melts the curds. Serve at once.'}},
  'Brazil':{fact:"Brazil are the most decorated World Cup nation with 5 titles (1958, 1962, 1970, 1994, 2002). The only team to appear in every single World Cup. Joga bonito — beautiful game — is their birthright.",recipe:{name:'🍖 Churrasco Picanha',ing:['2 lbs picanha (top sirloin cap)','Coarse sea salt only','Chimichurri to serve'],steps:'Score the fat cap in crosshatch. Fold meat into a C-shape on the skewer. Season heavily with coarse salt. Grill over charcoal, rotating constantly for 20-30 min. Slice thin against the grain and serve immediately.'}},
  'Argentina':{fact:"Argentina won the 2022 World Cup in Qatar in the most dramatic final in history — defeating France on penalties. Three World Cup titles total (1978, 1986, 2022). Messi finally got his crown.",recipe:{name:'🥩 Asado',ing:['Short ribs, flank steak, chorizo, morcilla','Coarse salt only','Chimichurri: parsley, garlic, oregano, olive oil, red wine vinegar, chili flakes'],steps:'Build a wood fire, let coals develop (no shortcuts). Salt meat generously. Grill slowly over moderate heat — asado is about patience, not speed. Serve with chimichurri and crusty bread. Open Malbec.'}},
  'Germany':{fact:"Germany are four-time World Cup winners (1954, 1974, 1990, 2014). Renowned for efficiency and pressing football. The Bundesliga is one of the world's top leagues. Their 7-1 demolition of Brazil in 2014 remains one of the most shocking results in history.",recipe:{name:'🌭 Currywurst',ing:['4 bratwurst sausages','1 cup ketchup','2 tbsp curry powder','1 tsp smoked paprika','Dash of Worcestershire'],steps:'Grill or pan-fry bratwurst until charred. Simmer ketchup with curry powder, paprika, and a splash of water for 5 min. Slice sausage into rounds, pour sauce over. Serve with fries and a crusty bread roll.'}},
  'France':{fact:"France won the 2018 World Cup in Russia and were runners-up in a penalty shootout in 2022. Two World Cup titles (1998, 2018). Les Bleus consistently field one of the most talented squads in the world.",recipe:{name:'🥐 Croque Monsieur',ing:['4 thick slices bread','4 slices good ham','150g Gruyère, grated','Béchamel: 2 tbsp butter, 2 tbsp flour, 1 cup milk, nutmeg','Dijon mustard'],steps:'Make béchamel: melt butter, whisk in flour, slowly add milk until thick. Spread mustard on bread, layer ham and half the cheese. Top with béchamel and remaining cheese. Bake 400°F / 200°C for 15 min until bubbling gold.'}},
  'England':{fact:"England invented association football in the 19th century and won their only World Cup in 1966 on home soil. The Premier League is the most watched football league on Earth. 'Football's coming home' — always hopeful, frequently heartbroken.",recipe:{name:'🐟 Fish & Chips',ing:['4 thick cod or haddock fillets','Beer batter: 1.5 cups flour, 1 cup cold beer, salt','4 large potatoes for chips','Malt vinegar, mushy peas, tartar sauce'],steps:'Peel and cut thick chips, soak 30 min. Double-fry: first at 300°F to cook through, then 375°F for crunch. Mix beer batter until just combined (lumpy is fine). Dip fish, fry at 375°F until deep golden. Salt everything immediately.'}},
  'Spain':{fact:"Spain won their only World Cup in 2010 with their iconic tiki-taka style. Euro champions in 1964, 2008, 2012, and 2024. La Liga is home to two of the world's biggest clubs: Real Madrid and FC Barcelona.",recipe:{name:'🥘 Paella Valenciana',ing:['2 cups bomba rice','Chicken thighs and rabbit (or mixed seafood)','Large pinch saffron','1 tsp smoked paprika','Green beans, butter beans, crushed tomato','1L hot chicken stock'],steps:'Bloom saffron in warm stock. Brown meat in wide paella pan with olive oil. Add tomato and paprika, fry 2 min. Add rice, stir to coat. Pour in saffron stock. Cook on high then reduce — DO NOT STIR AGAIN. Let socarrat crust form on bottom.'}},
  'Netherlands':{fact:"The Netherlands reached three World Cup finals (1974, 1978, 2010) without winning. They invented Total Football under Johan Cruyff — arguably the most influential tactical system in history.",recipe:{name:'🧇 Stroopwafels',ing:['2 cups flour','½ cup butter, softened','¼ cup sugar, 1 egg, 1 tsp instant yeast','Caramel: ½ cup butter, ½ cup dark syrup, 1 cup brown sugar, 1 tsp cinnamon'],steps:'Mix dough, rest 1 hr. Press balls in a hot waffle iron until thin and golden. Immediately split each waffle horizontally. Spread warm caramel between the two halves. Best placed over a hot coffee mug to soften before eating.'}},
  'Portugal':{fact:"Portugal won Euro 2016 but still chase their first World Cup. Eusébio's 1966 squad finished 3rd. Cristiano Ronaldo became the first man to score at 5 World Cups in 2022. Portugal play fluid, attacking football.",recipe:{name:'🐟 Bacalhau à Brás',ing:['500g salt cod (soaked 48hr, changing water)','4 eggs, beaten','1 onion, 3 garlic cloves','Fried shoestring potatoes','Black olives, fresh parsley'],steps:'Shred soaked and desalted cod. Sauté onion and garlic until golden. Add cod and potatoes, toss. Pour in beaten eggs off the heat, fold gently until just set — keep it creamy and slightly runny. Garnish with olives and parsley.'}},
  'Italy':{fact:"Italy are four-time World Cup winners (1934, 1938, 1982, 2006). Shockingly missed the 2018 and nearly missed 2022. Known for Catenaccio defending and technical midfield play. The Azzurri always find a way.",recipe:{name:'🍝 Cacio e Pepe',ing:['400g spaghetti or tonnarelli','200g Pecorino Romano, very finely grated','50g Parmigiano Reggiano, finely grated','2 tsp black pepper, freshly and coarsely cracked'],steps:'Cook pasta al dente, reserve 2 cups pasta water. Toast pepper in dry pan 1 min. Add a ladle pasta water to pan. Off heat, add pasta, toss with cheeses adding pasta water slowly to form a creamy sauce. No cream. Ever.'}},
  'Japan':{fact:"Japan has qualified for every World Cup since 1998. At the 2022 World Cup they sensationally defeated both Germany and Spain in the group stage. Known for their work rate, discipline, and impeccable sportsmanship.",recipe:{name:'🍛 Chicken Katsu Curry',ing:['2 chicken breasts, pounded thin','Panko breadcrumbs, egg, flour (for breading)','Japanese curry roux (S&B Golden Curry)','Onion, carrot, potato','Steamed Japanese short-grain rice'],steps:'Coat chicken: flour → egg → panko. Deep fry at 350°F until golden (165°F internal). Simmer diced veggies in water until soft, add curry roux blocks, stir until thick. Serve katsu sliced over rice with curry poured alongside.'}},

  'Croatia':{fact:"Croatia reached the World Cup final in 1998 (3rd place) and again finished 3rd in 2022. A nation of just 4 million people punching enormously above their weight. Their midfield football is technically exquisite.",recipe:{name:'🍗 Peka (Bell Dish)',ing:['1 whole chicken, cut up (or lamb)','Potatoes, zucchini, peppers, tomatoes, garlic','Fresh rosemary, olive oil, white wine','Salt and pepper generously'],steps:'Layer vegetables in a wide cast iron pan. Place chicken pieces on top. Season heavily, drizzle olive oil and wine. Cover with a domed peka lid or foil tightly. Bury under hot coals or roast at 425°F for 90 min undisturbed.'}},

  'Colombia':{fact:"Colombia were 1994 pre-tournament favorites who crashed out in the group stage in devastating fashion. James Rodríguez won the 2014 Golden Boot with a stunning tournament including a bicycle kick voted goal of the tournament.",recipe:{name:'🍲 Bandeja Paisa',ing:['Slow-cooked red beans with pork belly','White rice','Chicharrón (crispy fried pork belly)','Chorizo and seasoned ground beef','Fried egg, avocado slices, arepa, sweet plantain'],steps:'This is a feast, not a meal. Prepare each component separately. Arrange everything on the largest plate you own — the beans, rice, chicharrón, chorizo, beef, egg, avocado, and arepa all together. No combining. Judge your choices.'}},
  'Poland':{fact:"Poland finished 3rd at the 1974 and 1982 World Cups. Robert Lewandowski is their greatest ever player and all-time leading scorer. The White Eagles are a consistent qualifier with a passionate fan base.",recipe:{name:'🥟 Pierogi Ruskie',ing:['Dough: 2 cups flour, 1 egg, ½ cup sour cream, pinch salt','Filling: 2 cups mashed potato, 1 cup farmer cheese, 1 onion sautéed','Butter + caramelized onions for serving, sour cream to top'],steps:'Make dough, wrap, rest 30 min. Mix filling well and season. Roll dough thin, cut 3-inch circles. Place filling in center, fold and crimp tightly. Boil in salted water until floating plus 2 min. Finish in butter until lightly golden.'}},

  'Greece':{fact:"Greece's greatest footballing miracle was winning Euro 2004 as 80/1 outsiders — widely considered the biggest upset in tournament history. Otto Rehhagel's tactical masterpiece shocked the entire football world.",recipe:{name:'🥙 Gyros Pita',ing:['500g pork shoulder, sliced thin','Marinade: olive oil, lemon, oregano, garlic, paprika (overnight)','Pita bread','Tzatziki: Greek yogurt, grated cucumber (squeezed dry), dill, garlic','Tomato, onion, and — crucially — French fries inside'],steps:'Marinate pork overnight. Roast or grill at high heat until caramelized at edges. Warm pita. Spread tzatziki. Add meat, tomato, onion. Stuff fries right inside the pita. This is not optional. Wrap tightly in foil. Eat immediately.'}},

// ─── STATE ──────────────────────────────────────────────────────
var teams = [];
for(var i=0;i<9;i++) teams.push({id:i,name:'Team '+(i+1),mascot:MASCOTS[i],countries:[],points:0});

var smack=[
  {tid:0,text:"We're coming for that trophy! 🏆",time:'Earlier'},
  {tid:1,text:"Dream on. Our countries are GOAT tier. 🐐",time:'Earlier'}
];
var curPage='setup';
var editPts=false;
var factTabs={};
var factsQ='';
var pickerTeam=-1;
var pickerQ='';

// try load
try{
  var sv=localStorage.getItem('wcp26');
  if(sv){var p=JSON.parse(sv);teams=p.t||teams;smack=p.s||smack;}
}catch(e){}

function saveState(){
  try{localStorage.setItem('wcp26',JSON.stringify({t:teams,s:smack}));}catch(e){}
}

// ─── UTILS ──────────────────────────────────────────────────────
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function takenSet(excludeId){
  var s=new Set();
  teams.forEach(function(t){if(t.id!==excludeId)t.countries.forEach(function(c){s.add(c.n);});});
  return s;
}
function confetti(n){
  n=n||80;
  var cols=['#f5c518','#00a550','#e63946','#fff','#0096ff','#ff6b35','#8338ec'];
  var host=document.getElementById('confetti-host');
  for(var i=0;i<n;i++){
    (function(){
      var el=document.createElement('div');
      el.className='cp';
      var sz=8+Math.random()*10;
      el.style.cssText='left:'+Math.random()*100+'vw;width:'+sz+'px;height:'+(sz*(0.4+Math.random()*0.8))+'px;background:'+cols[Math.floor(Math.random()*cols.length)]+';transform:rotate('+Math.random()*360+'deg);animation-duration:'+(1.5+Math.random()*2)+'s;animation-delay:'+(Math.random()*0.5)+'s;';
      host.appendChild(el);
      el.addEventListener('animationend',function(){el.remove();});
    })();
  }
}

// ─── NAV ────────────────────────────────────────────────────────
function goPage(p){
  curPage=p;
  document.querySelectorAll('.nav-btn').forEach(function(b){b.classList.toggle('active',b.dataset.p===p);});
  document.querySelectorAll('.page').forEach(function(d){d.classList.remove('active');});
  document.getElementById('pg-'+p).classList.add('active');
  renderPage(p);
}
document.getElementById('nav').addEventListener('click',function(e){
  var b=e.target.closest('.nav-btn');
  if(b) goPage(b.dataset.p);
});

// ─── RENDER DISPATCH ────────────────────────────────────────────
function renderPage(p){
  if(p==='setup') renderSetup();
  else if(p==='standings') renderStandings();
  else if(p==='facts') renderFacts();
  else if(p==='smack') renderSmack();
}

// ─── SETUP ──────────────────────────────────────────────────────
function renderSetup(){
  var el=document.getElementById('pg-setup');
  var html='<div class="stitle">Team Setup</div><div class="ssub">9 teams · 3 countries each · Pick your squad!</div><div class="setup-grid">';
  teams.forEach(function(t){
    html+='<div class="team-card'+(t.countries.length===3?' full':'')+'"><div class="tc-head">';
    html+='<span class="tc-mascot">'+t.mascot+'</span>';
    html+='<input class="tc-name" value="'+esc(t.name)+'" placeholder="Team name" maxlength="20" data-tid="'+t.id+'">';
    html+='</div><div class="mascot-row">';
    MASCOTS.forEach(function(m){html+='<button class="mb'+(m===t.mascot?' sel':'')+'" data-tid="'+t.id+'" data-m="'+m+'">'+m+'</button>';});
    html+='</div><div class="slots">';
    for(var s=0;s<3;s++){
      var c=t.countries[s];
      html+='<div class="slot"><span class="slot-flag">'+(c?c.f:'🌐')+'</span>';
      html+='<span class="slot-name'+(c?' on':'')+'">'+esc(c?c.n:'Pick country '+(s+1))+'</span>';
      if(c) html+='<button class="slot-rm" data-tid="'+t.id+'" data-si="'+s+'">✕</button>';
      html+='</div>';
    }
    html+='</div>';
    html+='<button class="pick-btn" data-tid="'+t.id+'" '+(t.countries.length>=3?'disabled':'')+'>'+(t.countries.length>=3?'✅ Ready!':'+ Pick Country ('+(3-t.countries.length)+' left)')+'</button>';
    html+='</div>';
  });
  html+='</div>';
  el.innerHTML=html;

  el.querySelectorAll('.tc-name').forEach(function(inp){
    inp.addEventListener('input',function(){teams[+this.dataset.tid].name=this.value;saveState();});
  });
  el.querySelectorAll('.mb').forEach(function(b){
    b.addEventListener('click',function(){teams[+this.dataset.tid].mascot=this.dataset.m;saveState();renderSetup();});
  });
  el.querySelectorAll('.slot-rm').forEach(function(b){
    b.addEventListener('click',function(){teams[+this.dataset.tid].countries.splice(+this.dataset.si,1);saveState();renderSetup();});
  });
  el.querySelectorAll('.pick-btn').forEach(function(b){
    b.addEventListener('click',function(){
      if(!this.disabled){pickerTeam=+this.dataset.tid;pickerQ='';openPicker();}
    });
  });
}

// ─── PICKER ─────────────────────────────────────────────────────
function openPicker(){
  var taken=takenSet(pickerTeam);
  var tname=teams[pickerTeam].name;

  function build(){
    var q=pickerQ.toLowerCase();
    var html='<div class="modal"><h3>🌍 Pick for '+esc(tname)+'</h3>';
    html+='<input class="msearch" id="msearch" placeholder="Search countries..." value="'+esc(pickerQ)+'">';
    Object.keys(GROUPS).forEach(function(g){
      var vis=GROUPS[g].filter(function(c){return !q||c.n.toLowerCase().includes(q);});
      if(!vis.length) return;
      html+='<div class="glabel">'+g+'</div><div class="cgrid">';
      vis.forEach(function(c){
        var t=taken.has(c.n);
        html+='<button class="cbtn'+(t?' taken':'')+'" data-n="'+esc(c.n)+'" data-f="'+c.f+'"'+(t?' disabled':'')+'>'+c.f+' '+esc(c.n)+'</button>';
      });
      html+='</div>';
    });
    html+='<button class="mclose" id="mclose">Close</button></div>';
    return html;
  }

  var ov=document.createElement('div');
  ov.className='overlay';
  ov.id='picker-overlay';
  ov.innerHTML=build();
  document.body.appendChild(ov);

  function attach(){
    var ms=document.getElementById('msearch');
    if(ms){
      ms.focus();ms.setSelectionRange(ms.value.length,ms.value.length);
      ms.addEventListener('input',function(){pickerQ=this.value;ov.innerHTML=build();attach();});
    }
    ov.querySelectorAll('.cbtn:not(.taken)').forEach(function(b){
      b.addEventListener('click',function(){
        teams[pickerTeam].countries.push({n:this.dataset.n,f:this.dataset.f});
        saveState();ov.remove();
        if(teams[pickerTeam].countries.length<3) openPicker();
        else renderSetup();
      });
    });
    var mc=document.getElementById('mclose');
    if(mc) mc.addEventListener('click',function(){ov.remove();renderSetup();});
    ov.addEventListener('click',function(e){if(e.target===ov){ov.remove();renderSetup();}});
  }
  attach();
}

// ─── STANDINGS ──────────────────────────────────────────────────
function renderStandings(){
  var el=document.getElementById('pg-standings');
  var sorted=teams.slice().sort(function(a,b){return b.points-a.points;});
  var allPicked=teams.every(function(t){return t.countries.length===3;});

  var html='<div class="stitle">🏆 Standings</div><div class="ssub">Update points as the tournament progresses</div>';
  if(!allPicked) html+='<div style="background:rgba(245,197,24,.1);border:1px solid var(--gold);border-radius:10px;padding:13px 18px;margin-bottom:20px;color:var(--gold);font-size:.9rem;">⚠️ Not all teams have picked 3 countries yet!</div>';
  html+='<div class="std-actions"><button class="btn btn-outline" id="editptsBtn">'+(editPts?'💾 Save Points':'✏️ Edit Points')+'</button><button class="btn btn-gold" id="celebBtn">🎉 Celebrate!</button></div>';
  html+='<div class="card"><table><thead><tr><th style="width:50px">#</th><th>Team</th><th style="text-align:right">Points</th></tr></thead><tbody>';
  sorted.forEach(function(t,i){
    var rc=i===0?'r1':i===1?'r2':i===2?'r3':'';
    html+='<tr><td><div class="rank '+rc+'">'+(i+1)+'</div></td><td>';
    html+='<div style="display:flex;align-items:center;gap:10px"><span style="font-size:1.7rem">'+t.mascot+'</span><div>';
    html+='<div class="tname">'+esc(t.name)+'</div><div class="cpills">';
    t.countries.forEach(function(c){html+='<span class="pill">'+c.f+' '+esc(c.n)+'</span>';});
    if(!t.countries.length) html+='<span class="pill" style="color:var(--red)">No countries</span>';
    html+='</div></div></div></td>';
    if(editPts){
      html+='<td style="text-align:right"><input class="pts-in" type="number" min="0" value="'+t.points+'" data-tid="'+t.id+'"></td>';
    } else {
      html+='<td class="pts">'+t.points+' pts</td>';
    }
    html+='</tr>';
  });
  html+='</tbody></table></div>';
  el.innerHTML=html;

  document.getElementById('editptsBtn').addEventListener('click',function(){
    if(editPts){
      el.querySelectorAll('.pts-in').forEach(function(inp){teams[+inp.dataset.tid].points=+inp.value||0;});
      saveState();
    }
    editPts=!editPts;renderStandings();
  });
  document.getElementById('celebBtn').addEventListener('click',function(){confetti(120);});
  if(editPts){
    el.querySelectorAll('.pts-in').forEach(function(inp){
      inp.addEventListener('change',function(){teams[+this.dataset.tid].points=+this.value||0;saveState();});
    });
  }
}

// ─── FACTS ──────────────────────────────────────────────────────
function renderFacts(){
  var el=document.getElementById('pg-facts');
  var html='<div class="stitle">🌎 Country Facts & Recipes</div><div class="ssub">All 32 nations · Football history & traditional recipes</div>';
  html+='<input class="fsearch" id="fsearch" placeholder="🔍 Search countries..." value="'+esc(factsQ)+'">';
  html+='<div class="facts-grid" id="facts-grid"></div>';
  el.innerHTML=html;
  document.getElementById('fsearch').addEventListener('input',function(){factsQ=this.value;renderFactsGrid();});
  renderFactsGrid();
}
function renderFactsGrid(){
  var grid=document.getElementById('facts-grid');
  if(!grid) return;
  var q=factsQ.toLowerCase();
  var html='';
  ALL.forEach(function(c){
    if(q&&!c.n.toLowerCase().includes(q)) return;
    var d=FACTS[c.n]; if(!d) return;
    var tab=factTabs[c.n]||'fact';
    html+='<div class="fcard"><div class="fhead"><span class="fflag">'+c.f+'</span><span class="fcname">'+esc(c.n)+'</span></div>';
    html+='<div class="ftabs"><button class="ftab'+(tab==='fact'?' active':'')+'" data-cn="'+esc(c.n)+'" data-tab="fact">⚽ Football</button>';
    html+='<button class="ftab'+(tab==='recipe'?' active':'')+'" data-cn="'+esc(c.n)+'" data-tab="recipe">🍽️ Recipe</button></div>';
    html+='<div class="fbody">';
    if(tab==='fact'){html+='<p>'+esc(d.fact)+'</p>';}
    else{
      html+='<div class="rtitle">'+d.recipe.name+'</div><ul class="ilist">';
      d.recipe.ing.forEach(function(i){html+='<li>'+esc(i)+'</li>';});
      html+='</ul><p class="rsteps">'+esc(d.recipe.steps)+'</p>';
    }
    html+='</div></div>';
  });
  if(!html) html='<div class="empty"><div class="ei">🔍</div><h3>No countries found</h3><p>Try a different search</p></div>';
  grid.innerHTML=html;
  grid.querySelectorAll('.ftab').forEach(function(b){
    b.addEventListener('click',function(){factTabs[this.dataset.cn]=this.dataset.tab;renderFactsGrid();});
  });
}

// ─── SMACK ──────────────────────────────────────────────────────
function renderSmack(){
  var el=document.getElementById('pg-smack');
  var html='<div class="stitle">💬 Smack Talk Board</div><div class="ssub">Family trash talk · Keep it (mostly) friendly</div>';
  html+='<div class="sfeed">';
  if(!smack.length) html+='<div class="empty"><div class="ei">💬</div><h3>Silence...</h3><p>Be the first to talk smack</p></div>';
  else smack.slice().reverse().forEach(function(msg){
    var t=teams.find(function(x){return x.id===msg.tid;})||teams[0];
    html+='<div class="sbubble"><div class="shead"><span class="smascot">'+t.mascot+'</span><span class="steam">'+esc(t.name)+'</span><span class="stime">'+esc(msg.time)+'</span></div>';
    html+='<div class="stext">'+esc(msg.text)+'</div></div>';
  });
  html+='</div>';
  html+='<div class="card" style="margin-bottom:16px"><div style="font-family:Barlow Condensed,sans-serif;font-size:.8rem;letter-spacing:2px;color:var(--gray);text-transform:uppercase;margin-bottom:12px">Drop your message</div>';
  html+='<div class="scompose"><select class="ssel" id="sselect">';
  teams.forEach(function(t){html+='<option value="'+t.id+'">'+t.mascot+' '+esc(t.name)+'</option>';});
  html+='</select><input class="sinput" id="sinput" placeholder="Talk your smack..." maxlength="140"><button class="btn btn-green" id="ssend">Send 🔥</button></div></div>';
  html+='<button class="btn btn-outline" id="sclear" style="font-size:.8rem;padding:6px 14px">🗑️ Clear All</button>';
  el.innerHTML=html;

  function send(){
    var txt=document.getElementById('sinput').value.trim();
    var tid=+document.getElementById('sselect').value;
    if(!txt) return;
    smack.push({tid:tid,text:txt,time:'Just now'});
    saveState();document.getElementById('sinput').value='';renderSmack();
  }
  document.getElementById('ssend').addEventListener('click',send);
  document.getElementById('sinput').addEventListener('keydown',function(e){if(e.key==='Enter')send();});
  document.getElementById('sclear').addEventListener('click',function(){if(confirm('Clear all smack talk?')){smack=[];saveState();renderSmack();}});
}

// ─── INIT ───────────────────────────────────────────────────────
renderPage('setup');
</script>
